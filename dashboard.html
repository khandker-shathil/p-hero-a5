<!DOCTYPE html>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./styles/style.css">

<body>
    <header class="flex">
        <div class="p-5 navbar bg-base-100 shadow-sm">
        <div class="flex flex-1 items-center">
            <img class="max-h-10" src="/assets/github-logo.png" alt="">
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
            <button class="btn btn-primary"> <i class="fas fa-plus"></i> New Issues</button>
        </div>
        </div>
    </header>

    <section class="bg-[#F8FAFC] grid place-items-center shadow-md ">
        <div class="flex bg-white rounded gap-2 p-5 mt-10 w-10/12 shadow-md">
            <button id="btnAll" class="btn btn-active btn-primary">All</button>
            <button id="btnOpen" class="btn btn-soft">Open</button>
            <button id="btnClosed" class="btn btn-soft">Closed</button>
        </div>

        <div class="flex items-center justify-between bg-white rounded gap-2 p-5 mt-5 w-10/12 shadow-md">
            <div class="flex gap-2 items-center">
                <img class=" bg-purple-300/50 rounded-full p-2" src="./assets/Aperture.png" alt="">
                <div class="flex flex-col">
                    <h1 class="text-2xl font-semibold">50 Issues</h1>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-2">
                <p> <i class="fas fa-circle text-[#00A96E]"></i> Open</p>
                <p> <i class="fas fa-circle text-[#A855F7]"></i> Closed</p>
            </div>
        </div>
    </section>

     <section id="spinner" class="flex justify-center items-center py-10 hidden">
        <span class="loading loading-bars loading-xl"></span>
    </section>

        <div id="cards" class="grid grid-cols-4 gap-4 p-5 mx-auto shadow-sm w-10/12">
